<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#a42833" />
  <title>Visita enviada — El Método 360</title>
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body>
  <header class="app-header">
    <div class="app-logo">
      <img class="logo-mark" src="assets/logo.png" alt="El Método 360" />
      <div class="logo-text">
        <div class="sublabel">Mystery Shopper</div>
        <div class="sublabel-sub">Visita completada</div>
      </div>
    </div>
  </header>

  <main class="container">
    <div class="card" style="text-align:center; padding: 32px 20px;">
      <div style="font-family: var(--font-serif); font-size: 28px; margin-bottom: 8px;">Gracias</div>
      <p style="color: var(--c-muted)">Tu visita ha sido registrada correctamente. El equipo de El Método 360 procesará el informe en las próximas 24-48 horas.</p>
      <p style="color: var(--c-muted); font-size: 13px; margin-top: 24px;">Si necesitas reportar algo adicional, contacta por email: <a href="mailto:hola@elmetodo360.es">hola@elmetodo360.es</a></p>
      <button class="btn btn-ghost" onclick="window.location.href='index.html'" style="margin-top: 20px;">Volver al inicio</button>
    </div>
  </main>
</body>
</html>
