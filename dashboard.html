<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#a42833" />
  <title>Dashboard — Mystery Shopper · El Método 360</title>
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body>
  <header class="app-header">
    <div class="app-logo">
      <svg class="logo-mark" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg" aria-label="El Método 360">
        <circle cx="20" cy="20" r="18" fill="#a42833"/>
        <circle cx="20" cy="20" r="14" fill="none" stroke="#c8902e" stroke-width="1.5"/>
        <text x="20" y="24.5" text-anchor="middle" font-family="Montserrat, sans-serif" font-weight="800" font-size="12" fill="#ffffff">360</text>
      </svg>
      <div class="logo-text">
        <div class="brand">EL MÉTODO <span class="accent">360</span></div>
        <div class="sublabel">Dashboard interno</div>
      </div>
    </div>
    <button class="btn btn-ghost" id="logoutBtn" style="padding:6px 12px; font-size:12px; display:none">Salir</button>
  </header>

  <main class="container">
    <section id="loginSection">
      <div class="card" style="max-width:400px; margin: 40px auto;">
        <h3 style="margin-top:0">Acceso interno</h3>
        <p style="margin-top:0; color: var(--c-muted); font-size: 14px;">Introduce el código de admin de El Método 360.</p>
        <div class="field">
          <input type="password" id="adminCodeInput" placeholder="Código admin" />
        </div>
        <button class="btn btn-primary btn-block" id="adminLoginBtn">Entrar</button>
      </div>
    </section>

    <section id="dashboardSection" style="display:none">
      <div style="display:flex; gap:8px; flex-wrap:wrap; margin-bottom: 12px;">
        <button class="btn btn-accent" id="newVisitBtn">Generar enlace de visita</button>
        <button class="btn btn-ghost" id="importBtn">Importar JSON</button>
        <button class="btn btn-ghost" id="configBtn">Configuración</button>
      </div>
      <input type="file" id="importFile" accept="application/json" style="display:none" />

      <h2 style="margin-top:8px">Resumen</h2>
      <div class="dash-grid" id="kpiGrid"></div>

      <h2>Visitas</h2>
      <div class="visit-list" id="visitList"></div>

      <div id="visitDetail" style="display:none; margin-top: 32px;"></div>
    </section>

    <div id="modalContainer"></div>
  </main>

  <div class="toast" id="toast"></div>

  <script src="assets/storage.js"></script>
  <script src="assets/checklist.js"></script>
  <script src="assets/dashboard.js"></script>
</body>
</html>
